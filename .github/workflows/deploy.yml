name: Deploy Portfolio

on:
  push:
    branches:
      - main  # Triggers the pipeline whenever you push code to your main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Injects your GitHub Secrets safely into Vite's compiler environment
      - name: Build Project
        run: npm run build
        env:
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}

      # --- DEPLOYMENT STEP ---
      # Un-comment or add your specific deployment runner block below 
      # (e.g., GitHub Pages, Vercel, Netlify, Firebase, S3, etc.)
      #
      # - name: Deploy to GitHub Pages
      #   uses: peaceiris/actions-gh-pages@v3
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: ./dist