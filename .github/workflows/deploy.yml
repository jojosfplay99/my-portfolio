name: Deploy Portfolio

on:
  push:
    branches:
      - main  # Runs the pipeline automatically every time you push code to main

permissions:
  contents: write  # Gives the action permission to commit the build back to your gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # THIS STEP INJECTS YOUR SECRETS PRECISELY DURING COMPILATION
      # This fixes the "botundefined" issue by turning them into actual string values
      - name: Build Project
        run: npm run build
        env:
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}

      # Deploys the newly compiled './dist' folder directly to your live GitHub Pages site
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist